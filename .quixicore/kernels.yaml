schema_version: 0.2
backend: rocm
layout: canonical_arch_variants

status_values:
  - optimized
  - implemented
  - imported
  - experimental
  - planned
  - unsupported
  - capability_gated

variant_path_rule: kernels/<family>/<operation>/variants/rocm_<target>[/<tuned_variant>]

families:
  norms:
    status: implemented
    paths:
      - kernels/norms
  activations:
    status: partial
    paths:
      - kernels/activations
  attention:
    status: partial
    paths:
      - kernels/attention
  linear_attention:
    status: partial
    paths:
      - kernels/linear_attention
  ssm:
    status: partial
    paths:
      - kernels/ssm
  matmul:
    status: implemented
    paths:
      - kernels/matmul
  quantization:
    status: partial
    paths:
      - kernels/quantization
  moe:
    status: partial
    paths:
      - kernels/moe
  sampling:
    status: planned
    paths:
      - kernels/sampling
  serving:
    status: partial
    paths:
      - kernels/serving
  optimizers:
    status: planned
    paths:
      - kernels/optimizers
  collectives:
    status: experimental
    paths:
      - distributed-kernels
  utils:
    status: planned
    paths:
      - kernels/utils

operations:
  layernorm:
    family: norms
    status: implemented
    path: kernels/norms/layernorm
    variants:
      - name: rocm_cdna3
        status: imported
        path: kernels/norms/layernorm/variants/rocm_cdna3
      - name: rocm_cdna4
        status: implemented
        path: kernels/norms/layernorm/variants/rocm_cdna4

  rmsnorm:
    family: norms
    status: imported
    path: kernels/norms/rmsnorm
    variants:
      - name: rocm_cdna3
        status: imported
        path: kernels/norms/rmsnorm/variants/rocm_cdna3

  softmax:
    family: activations
    status: implemented
    path: kernels/activations/softmax
    variants:
      - name: rocm_cdna3
        status: imported
        path: kernels/activations/softmax/variants/rocm_cdna3
      - name: rocm_cdna4
        status: implemented
        path: kernels/activations/softmax/variants/rocm_cdna4

  elementwise:
    family: activations
    status: optimized
    path: kernels/activations/elementwise
    notes: >-
      Port of QuixiCore-CUDA/kernels/elementwise (rms/layernorm fwd+bwd,
      add_norm +fp8-e4m3 epilogues, softmax, gelu, glu x6, dropout,
      cross_entropy +_mw, embedding +2 bwd +multimodal, hadamard, adamw, add).
      Plain-CUDA tm_* kernels hipified with CDNA3 warp adaptations (mask-free
      __shfl_*). 56/56 fp64-oracle checks pass on MI300X.
    variants:
      - name: rocm_cdna3
        status: imported
        path: kernels/activations/elementwise/variants/rocm_cdna3

  qgemv:
    family: quantization
    status: imported
    path: kernels/quantization/qgemv
    notes: >-
      Dequant + fp16/int8 GEMV + runtime-quant port of
      QuixiCore-CUDA/kernels/quant. 29/29 GGUF/MX/FP/BitNet formats dequant
      byte-exact vs quant.py + GEMV pass; W8A8/W2A8 int8 GEMV pass;
      per-token/per-tensor int8+fp8 quantize pass on MI300X.
      __dp4a -> __builtin_amdgcn_sdot4 (gfx942 V_DOT4). Tensor-core qgemm
      (tm_qmm.cuh PTX mma.sync) deferred to the MFMA pass.
    variants:
      - name: rocm_cdna3
        status: imported
        path: kernels/quantization/qgemv/variants/rocm_cdna3

  moe:
    family: moe
    status: imported
    path: kernels/moe
    notes: >-
      Port of QuixiCore-CUDA/kernels/moe (routing, histogram/scan, scatter/
      gather, grouped GEMM, end-to-end MoE MLP). 8/8 checks pass on MI300X.
      moe_quant (fp8/nvfp4 experts) depends on tensor-core mma16816 and is
      ported with the MFMA pass.
    variants:
      - name: rocm_cdna3
        status: imported
        path: kernels/moe/variants/rocm_cdna3

  serving:
    family: serving
    status: imported
    path: kernels/serving
    notes: >-
      Port of QuixiCore-CUDA/kernels/serving. All 12 self-checking harnesses
      pass on MI300X: paged attention (v1/v2/cascade), GQA-staged, quantized-KV
      decode, variable-length prefill, MLA decode, fused RoPE-on-KV, KV
      scatter/gather + sliding window, sampling, logit processors, beam-cache
      reindex, speculative-decode tree, EAGLE, sparse serving. hipify +
      mask-free __shfl_* + __dp4a->sdot4 (fp8-KV path).
    variants:
      - name: rocm_cdna3
        status: imported
        path: kernels/serving/variants/rocm_cdna3

  lm_head:
    family: quantization
    status: imported
    path: kernels/quantization/lm_head
    notes: >-
      Vocab-projection argmax/categorical sampling over fp16 and quantized
      weights (scalar GEMV-argmax). 20/20 token-match checks pass on MI300X.
    variants:
      - name: rocm_cdna3
        status: imported
        path: kernels/quantization/lm_head/variants/rocm_cdna3

  turboquant:
    family: quantization
    status: imported
    path: kernels/quantization/turboquant
    notes: >-
      Turboquant (FWHT rotate, permute_cols, moe_lora_align) + mixed-format
      primitives (fp4/e8m0 roundtrip, scan, nvfp4 swizzle). Plain ports; ALL
      PASS on MI300X.
    variants:
      - name: rocm_cdna3
        status: imported
        path: kernels/quantization/turboquant/variants/rocm_cdna3

  moe_quant:
    family: moe
    status: imported
    path: kernels/moe
    notes: >-
      Quantized MoE grouped GEMMs (fp8/nvfp4/wna16 int4/int8) rewritten to gfx942
      MFMA via tm_qmm_mfma.cuh, plus plain silu/quant/routing kernels. ALL PASS
      vs fp64 on MI300X.
    variants:
      - name: rocm_cdna3_quant
        status: imported
        path: kernels/moe/variants/rocm_cdna3_quant

  hedgehog:
    family: linear_attention
    status: imported
    path: kernels/linear_attention/hedgehog
    notes: Hybrid dual-softmax-feature linear + block-terraced windowed-exact attention. vs fp64 PASS ~0.16%.
    variants:
      - name: rocm_cdna3
        status: imported
        path: kernels/linear_attention/hedgehog/variants/rocm_cdna3

  fftconv:
    family: ssm
    status: imported
    path: kernels/ssm/fftconv
    notes: FFT convolution as direct circular convolution. vs fp64 PASS (exact).
    variants:
      - name: rocm_cdna3
        status: imported
        path: kernels/ssm/fftconv/variants/rocm_cdna3

  based:
    family: linear_attention
    status: imported
    path: kernels/linear_attention/based
    notes: 2nd-order Taylor-feature causal linear attention. vs fp64 oracle PASS ~0.14% on MI300X.
    variants:
      - name: rocm_cdna3
        status: imported
        path: kernels/linear_attention/based/variants/rocm_cdna3

  flux:
    family: matmul
    status: imported
    path: kernels/matmul/flux
    notes: Dense bf16 matmul + fused gelu/gate epilogue via MFMA. ALL PASS vs fp64 on MI300X.
    variants:
      - name: rocm_cdna3
        status: imported
        path: kernels/matmul/flux/variants/rocm_cdna3

  qgemm:
    family: quantization
    status: imported
    path: kernels/quantization/qgemm
    notes: >-
      Tensor-core quantized GEMM. CUDA PTX mma.sync.m16n8k16 rewritten to gfx942
      v_mfma_f32_16x16x16_f16 (tm_qmm_mfma.cuh) on a 64-wide wavefront. qgemm
      (weight-only, fragment + full-dequant + K-split) 58/58 PASS and qflux
      (fused gelu+bias) 29/29 PASS vs golden on MI300X. lm_head/moe_quant reuse
      this primitive (pending).
    variants:
      - name: rocm_cdna3
        status: imported
        path: kernels/quantization/qgemm/variants/rocm_cdna3

  rotary:
    family: attention
    status: implemented
    path: kernels/attention/rotary
    variants:
      - name: rocm_cdna3
        status: imported
        path: kernels/attention/rotary/variants/rocm_cdna3
      - name: rocm_cdna4
        status: implemented
        path: kernels/attention/rotary/variants/rocm_cdna4

  gqa:
    family: attention
    status: implemented
    path: kernels/attention/gqa
    variants:
      - name: rocm_cdna3
        status: optimized
        path: kernels/attention/gqa/variants/rocm_cdna3
        notes: MFMA-tiled flash forward, 16.65x over naive (97 TFLOP/s); vs SDPA 0.023%.
      - name: rocm_cdna4
        status: implemented
        path: kernels/attention/gqa/variants/rocm_cdna4

  gqa_backward:
    family: attention
    status: implemented
    path: kernels/attention/gqa_backward
    variants:
      - name: rocm_cdna3
        status: implemented
        path: kernels/attention/gqa_backward/variants/rocm_cdna3
        notes: Correct CDNA3 backward (dQ/dK/dV); validated vs fp64 analytic oracle.
      - name: rocm_cdna4
        status: implemented
        path: kernels/attention/gqa_backward/variants/rocm_cdna4

  gqa_causal:
    family: attention
    status: implemented
    path: kernels/attention/gqa_causal
    variants:
      - name: rocm_cdna3
        status: optimized
        path: kernels/attention/gqa_causal/variants/rocm_cdna3
        notes: MFMA-tiled causal flash forward, 13.5x over naive (77 TFLOP/s).
      - name: rocm_cdna4
        status: implemented
        path: kernels/attention/gqa_causal/variants/rocm_cdna4

  gqa_causal_backward:
    family: attention
    status: implemented
    path: kernels/attention/gqa_causal_backward
    variants:
      - name: rocm_cdna3
        status: implemented
        path: kernels/attention/gqa_causal_backward/variants/rocm_cdna3
        notes: Correct CDNA3 backward (dQ/dK/dV); validated vs fp64 analytic oracle.
      - name: rocm_cdna4
        status: implemented
        path: kernels/attention/gqa_causal_backward/variants/rocm_cdna4

  bf16fp32_matmul:
    family: matmul
    status: implemented
    path: kernels/matmul/bf16fp32
    variants:
      - name: rocm_cdna3
        status: imported
        path: kernels/matmul/bf16fp32/variants/rocm_cdna3/8192_256_256_64_16
      - name: rocm_cdna4
        status: implemented
        path: kernels/matmul/bf16fp32/variants/rocm_cdna4/mi350x
      - name: rocm_cdna4_micros
        status: experimental
        path: kernels/matmul/bf16fp32/variants/rocm_cdna4/micros
      - name: rocm_udna1
        status: experimental
        path: kernels/matmul/bf16fp32/variants/rocm_udna1/gfx1250

  fp8fp32_matmul:
    family: matmul
    status: implemented
    path: kernels/matmul/fp8fp32
    variants:
      - name: rocm_cdna3
        status: imported
        path: kernels/matmul/fp8fp32/variants/rocm_cdna3/8192_256_256_64_32
      - name: rocm_cdna4_4wave
        status: implemented
        path: kernels/matmul/fp8fp32/variants/rocm_cdna4/FP8_4wave
      - name: rocm_cdna4_8wave
        status: implemented
        path: kernels/matmul/fp8fp32/variants/rocm_cdna4/FP8_8wave

  mxfp8_matmul:
    family: matmul
    status: implemented
    path: kernels/matmul/mxfp8
    variants:
      - name: rocm_cdna3
        status: capability_gated
        path: kernels/matmul/mxfp8/variants/rocm_cdna3
        notes: CDNA4 scaled-MFMA MXFP8 path does not map directly to gfx942.
      - name: rocm_cdna4_4wave
        status: implemented
        path: kernels/matmul/mxfp8/variants/rocm_cdna4/MXFP8_4wave
      - name: rocm_cdna4_8wave
        status: implemented
        path: kernels/matmul/mxfp8/variants/rocm_cdna4/MXFP8_8wave

  scaled_matmul:
    family: matmul
    status: implemented
    path: kernels/matmul/scaled_matmul
    variants:
      - name: rocm_cdna3
        status: imported
        path: kernels/matmul/scaled_matmul/variants/rocm_cdna3
      - name: rocm_cdna4
        status: implemented
        path: kernels/matmul/scaled_matmul/variants/rocm_cdna4

notes:
  - Normal build and test discovery must filter by `variants/rocm_<target>` and skip archive directories.
  - Upstream architecture branches are import sources only; supported target variants live side by side in main.
  - CUDA-to-CDNA3 parity status is tracked in `docs/cuda-to-cdna3-port-status.md`.
